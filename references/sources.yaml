  - id: gpai-code-of-practice-2025
    title: "General-Purpose AI Code of Practice — Final version (July 2025)"
    type: voluntary-code
    url: https://digital-strategy.ec.europa.eu/en/policies/contents-code-gpai
    alt_url: https://code-of-practice.ai/
    accessed: 2026-04-25
    sha256: null
    license: public-domain-eu-doc
    binary_path: null
    excerpt_paths: []
    notes: |
      Voluntary tool produced by independent experts in a multi-stakeholder
      process, confirmed by the Commission and AI Board as adequate to
      demonstrate compliance with Article 53 (and, for systemic-risk providers,
      with Article 55 via the Safety and Security chapter). Three chapters:
      Transparency, Copyright, Safety and Security. Adherence is voluntary.

  - id: gpai-guidelines-commission-2025
