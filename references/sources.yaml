  - id: ai-act-service-desk
    title: "EU AI Act Service Desk — official Compliance Checker, AI Act Explorer, helpdesk"
    type: official-tooling
    url: https://ai-act-service-desk.ec.europa.eu/
    accessed: 2026-04-25
    sha256: null
    license: public-domain-eu-tool
    binary_path: null
    excerpt_paths: []
    notes: |
      Hosted by DG CONNECT. The official self-assessment tool to clarify
      obligations. Beta status as of 2026; the source-of-truth for borderline
      classification questions of EU origin.

  - id: cen-cenelec-jtc-21
    title: "CEN-CENELEC JTC 21 — European AI standardisation work programme"
    type: standardisation
    url: https://jtc21.eu/
    alt_url: https://digital-strategy.ec.europa.eu/en/policies/ai-act-standardisation
    accessed: 2026-04-25
    sha256: null
    license: public-domain-eu-tool
    binary_path: null
    excerpt_paths: []
    notes: |
      JTC 21 develops European harmonised standards in support of the AI Act.
      First publications expected from 2026. Track for technical conformity
      with Articles 9 (risk management), 10 (data governance), 13 (transparency),
      14 (human oversight), 15 (accuracy/robustness/cybersecurity), 17 (QMS).
      Notable in-progress: prEN 18286 — Quality management system for EU AI
      Act regulatory purposes.
      ISO/IEC 42001:2023 (AI management systems) was assessed by the AI Office
      as not fully aligned with the AI Act and is not part of EU harmonisation.

  - id: ai-act-explorer-eu
    title: "AI Act Explorer — artificialintelligenceact.eu (third-party authoritative tracker)"
    type: third-party-reference
    url: https://artificialintelligenceact.eu/
    accessed: 2026-04-25
    license: cc-by-4.0
    notes: |
      Open-source AI Act tracker maintained by the Future of Life Institute.
      Useful for full-text search, cross-references between articles,
      considerations, and annexes. Also provides a non-official Compliance
      Checker (different from the Commission's). Cite the Regulation, not
      the tracker.

  - id: edpb-edps-joint-opinions-ai
    title: "EDPB / EDPS joint opinions on AI Act and AI deployment in EU bodies"
    type: dpo-guidance
    url: https://edpb.europa.eu/our-work-tools/our-documents_en
    accessed: 2026-04-25
    notes: |
      EDPB and EDPS issue joint opinions and guidelines on AI deployment
      with data-protection implications. Useful in conjunction with
      Article 27 FRIA (combine with GDPR DPIA) and high-risk biometrics.

  - id: digital-omnibus-ai-2025
    title: "Digital Omnibus on AI — Commission proposal to amend Regulation (EU) 2024/1689 (19 November 2025)"
    type: legislative-proposal
    url: https://www.europarl.europa.eu/legislative-train/package-digital-package/file-digital-omnibus-on-ai
    alt_url: https://digital-strategy.ec.europa.eu/en/library/digital-omnibus-ai
    accessed: 2026-04-28
    sha256: null
    license: public-domain-eu-doc
    binary_path: null
    excerpt_paths: []
    notes: |
      Commission proposal of 19 November 2025 to delay the application
      of high-risk AI obligations under Regulation (EU) 2024/1689.
      Status as of 2026-04-28: in trilogue, NOT yet adopted.
      Council general approach: 13 March 2026.
      European Parliament negotiating position: 26 March 2026.
      Both align on fixed deadlines:
        - 2 December 2027 — stand-alone high-risk AI systems (Annex III)
                            and Article 50 transparency
        - 2 August 2028  — high-risk AI systems embedded as safety
                            components in Annex I products
      Article 4 (AI literacy) and Article 5 (prohibitions) — in force
      since 2 February 2025 — and Chapter V GPAI obligations — in
      force since 2 August 2025 — are NOT affected.
      Until the amendment is published in the Official Journal, the
      original Art. 113 dates of Regulation (EU) 2024/1689 remain
      legally binding. Promote to a primary citable source with a
      textual extract once adopted.
      Tracked by:
        - Parliament IPR press release 26 March 2026:
          https://www.europarl.europa.eu/news/en/press-room/20260323IPR38829/artificial-intelligence-act-delayed-application-ban-on-nudifier-apps
        - IAPP analysis:
          https://iapp.org/news/a/eu-digital-omnibus-analysis-of-key-changes

